name: AETHER BRAIN 16GB (trilhoes de combinacoes, git-only, nunca bloqueia)
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"
concurrency:
  group: brain
  cancel-in-progress: false
jobs:
  brain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AETHER_PAT }}
      - name: deps
        run: pip install --quiet numpy scipy || true
      - name: corpus do Drive (591+ canais)
        run: |
          curl -s https://rclone.org/install.sh | sudo bash || true
          mkdir -p ~/.config/rclone transcripts
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf || true
          rclone copy gdrive:AETHER_TRANSCRIPTS/youtube transcripts --include "*.jsonl" --transfers 32 --fast-list || true
      - name: RECLASSIFICAR todos os canais
        run: python reclassify.py || true
      - name: CRUZAMENTO EM MASSA (16GB, vocab 6000 = milhoes de combinacoes)
        env:
          MASS_V: "6000"
        run: |
          python fast_interlink.py || true
          python profit_engine.py || true
          python brain_memory.py || true
          python mass_ideas.py || true
      - name: commit + push (git, re-dispara o loop, SEM REST)
        run: |
          git config user.name aether-bot
          git config user.email bot@aether
          git add -A
          git commit -m "brain 16GB $(date -u +%FT%TZ)" || echo nochange
          git push || echo nopush
