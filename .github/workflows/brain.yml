name: AETHER BRAIN 16GB (trilhoes de combinacoes, git-only, nunca bloqueia)
on:
  push:
    branches: [ main ]
    paths-ignore: [ 'GITHUB_LIMITS.json', 'AI_HEALTH.json', '**.md', 'index.html' ]
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"
concurrency:
  group: brain
  cancel-in-progress: false
jobs:
  brain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AETHER_PAT }}
      - name: deps
        run: pip install --quiet numpy scipy yt-dlp youtube-transcript-api || true
      - name: corpus do Drive (591+ canais)
        run: |
          curl -s https://rclone.org/install.sh | sudo bash || true
          mkdir -p ~/.config/rclone transcripts
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf || true
          rclone copy gdrive:AETHER_TRANSCRIPTS/youtube transcripts --include "*.jsonl" --transfers 32 --fast-list || true
      - name: SCRAPE transcricoes NOVAS (infinito) + salva no Drive
        run: |
          python channel_ranks.py || true
          python scrape_incremental.py || true
          python mine_channel.py || true
          python backfill_desc.py || true
          rclone copy transcripts gdrive:AETHER_TRANSCRIPTS/youtube --include "*.jsonl" --transfers 32 || true
      - name: escolher melhor IA gratis do momento (tempo real)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          BEST=$(AI_ONCE=1 python ai_health.py 2>/dev/null | tail -1)
          [ -n "$BEST" ] && echo "AETHER_AI_ORDER=$BEST" >> $GITHUB_ENV
          echo "melhor IA agora: $BEST"
      - name: RECLASSIFICAR todos os canais
        run: python reclassify.py || true
      - name: CRUZAMENTO EM MASSA (16GB, vocab 6000 = milhoes de combinacoes)
        env:
          MASS_V: "6000"
        run: |
          python fast_interlink.py || true
          python profit_engine.py || true
          python results_collector.py || true
          python brain_memory.py || true
          python mass_ideas.py || true
      - name: ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg || true
      - name: GOVERNADOR + PUBLICAR (marca, QA>=80, cooldowns)
        env:
          AETHER_AI_ORDER: ${{ secrets.AETHER_AI_ORDER }}
          AETHER_AUTONOMY: ${{ secrets.AETHER_AUTONOMY }}
          AETHER_CONTENT_DIR: ${{ secrets.AETHER_CONTENT_DIR }}
          AETHER_MODEL: ${{ secrets.AETHER_MODEL }}
          AMAZON_US_TAG: ${{ secrets.AMAZON_US_TAG }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          AWIN_AFFID: ${{ secrets.AWIN_AFFID }}
          AWIN_API_TOKEN: ${{ secrets.AWIN_API_TOKEN }}
          CLICKBANK_ID: ${{ secrets.CLICKBANK_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_PRO_MODEL: ${{ secrets.GEMINI_PRO_MODEL }}
          GH_OFFLOAD_PAT: ${{ secrets.GH_OFFLOAD_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_PAT2: ${{ secrets.GH_PAT2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GS_AMAZON_TABLE: ${{ secrets.GS_AMAZON_TABLE }}
          GS_SUPABASE_ANON_KEY: ${{ secrets.GS_SUPABASE_ANON_KEY }}
          GS_SUPABASE_URL: ${{ secrets.GS_SUPABASE_URL }}
          HOST: ${{ secrets.HOST }}
          IG_TARGET_GMAIL: ${{ secrets.IG_TARGET_GMAIL }}
          IG_TARGET_HANDLE: ${{ secrets.IG_TARGET_HANDLE }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_SYSUSER_TOKEN: ${{ secrets.META_SYSUSER_TOKEN }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PORT: ${{ secrets.PORT }}
          SQLITE_PATH: ${{ secrets.SQLITE_PATH }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_RT_ADHD: ${{ secrets.YOUTUBE_RT_ADHD }}
          YOUTUBE_RT_BSN: ${{ secrets.YOUTUBE_RT_BSN }}
          YOUTUBE_RT_DBN: ${{ secrets.YOUTUBE_RT_DBN }}
          YOUTUBE_RT_PINK: ${{ secrets.YOUTUBE_RT_PINK }}
          YOUTUBE_RT_RAIN: ${{ secrets.YOUTUBE_RT_RAIN }}
          YOUTUBE_RT_TINNITUS: ${{ secrets.YOUTUBE_RT_TINNITUS }}
          YOUTUBE_RT_WNV: ${{ secrets.YOUTUBE_RT_WNV }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_GLOBALSUP_CLIENT_ID: ${{ secrets.YT_GLOBALSUP_CLIENT_ID }}
          YT_GLOBALSUP_CLIENT_SECRET: ${{ secrets.YT_GLOBALSUP_CLIENT_SECRET }}
          YT_RT_GLOBALSUP: ${{ secrets.YT_RT_GLOBALSUP }}
        run: |
          python governor.py || true
          python publish_products.py || true
          python publish_shorts.py || true
      - name: commit + push (git, re-dispara o loop, SEM REST)
        run: |
          git config user.name aether-bot
          git config user.email bot@aether
          git add -A
          git commit -m "brain 16GB $(date -u +%FT%TZ)" || echo nochange
          git push || echo nopush