name: AETHER BRAIN 16GB (trilhoes de combinacoes, git-only, nunca bloqueia)
on:
  push:
    branches:
    - main
    paths-ignore:
    - GITHUB_LIMITS.json
    - NEURAL_GRAPH.json
    - ACUMULADO.json
    - COBERTURA.json
    - FRASES_CATEGORIAS.json
    - SINAPSES.json
    - AUDITORIA_CANAL.json
    - KNOWLEDGE_ETERNO.json
    - CANAIS_STATS.json
    - DECISIONS.json
    - DECISIONS_ETERNAS.md
    - LIVE_ENDPOINT.json
    - AI_HEALTH.json
    - '**.md'
    - index.html
    - OTIMIZACOES.json
    - CONHECIMENTO_PRODUCAO.json
    - PAUTA.json
    - CORE_STATE.json
    - PENDING_ACTIONS.json
    - RESULTS.json
    - BRAIN_MEMORY.json
    - INTERLINK.json
    - MASS_IDEAS.json
    - AETHER_CANAIS_CATEGORIAS.json
    - AETHER_CANAIS_CONFIANCA.json
    - GOVERNOR_LOG.md
    - vault/**
    - out/**
    - '**.jsonl'
    - TOPICOS_POR_VIDEO.json
  workflow_dispatch: {}
  schedule:
  - cron: '*/30 * * * *'
concurrency:
  group: brain-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  otimizador:
    name: AGENTE OTIMIZADOR (arruma o que ja esta em producao)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.AETHER_PAT }}
    - name: deps
      run: pip install --quiet requests || true
    - name: DIAGNOSTICO + OTIMIZACAO do canal em producao
      env:
        YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        YT_RT_GLOBALSUP: ${{ secrets.YT_RT_GLOBALSUP }}
        AUDIT_APPLY: ${{ vars.AUDIT_APPLY || '0' }}
      run: 'python otimizador.py || true

        git config user.email aether@local; git config user.name aether

        git add OTIMIZACOES.json 2>/dev/null || true

        git commit -q -m "otimizacoes do que esta em producao" || echo "nada novo"

        git pull --rebase -q origin main || git rebase --abort || true

        git push origin main && echo "SALVO: otimizacoes" || echo "FALHA"

        '
  coletor:
    name: AGENTE COLETOR (colhe transcricoes novas)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.AETHER_PAT }}
    - name: deps
      run: pip install --quiet numpy scipy yt-dlp youtube-transcript-api || true
    - name: corpus do Drive (591+ canais)
      run: 'curl -s https://rclone.org/install.sh | sudo bash || true

        mkdir -p ~/.config/rclone transcripts

        echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf || true

        rclone copy gdrive:AETHER_TRANSCRIPTS/youtube transcripts --include "*.jsonl" --transfers 32 --fast-list || true

        mkdir -p transcripts_ts

        rclone copy gdrive:AETHER_TRANSCRIPTS/youtube_ts transcripts_ts --include "*.jsonl" --transfers 32 --fast-list || true

        '
    - name: TIMESTAMPS REAIS de cada fala (backfill incremental)
      env:
        TS_BATCH: '250'
      run: 'timeout 600 python backfill_ts.py || echo "timestamps no teto de tempo (continua no proximo ciclo)"

        rclone copy transcripts_ts gdrive:AETHER_TRANSCRIPTS/youtube_ts --include "*.jsonl" --transfers 32 || true

        '
    - name: MONITOR PERPETUO dos canais (descobre o que falta)
      env:
        WATCH_BATCH: '60'
        WATCH_MAXV: '300'
      run: 'python channel_watch.py || true

        git config user.email aether@local; git config user.name aether

        git add COBERTURA.json 2>/dev/null || true

        git commit -q -m "cobertura dos canais" || echo "nada novo"

        git pull --rebase -q origin main || git rebase --abort || true

        git push origin main && echo "SALVO: cobertura" || echo "FALHA AO SALVAR: cobertura"

        '
    - name: BAIXA AUTOMATICO o que falta (ja com timestamp real)
      env:
        SCRAPE_BATCH: '60'
      run: 'timeout 720 python scrape_missing.py || echo "download interrompido no teto de tempo (continua no proximo ciclo)"

        rclone copy transcripts gdrive:AETHER_TRANSCRIPTS/youtube --include "*.jsonl" --transfers 32 || true

        rclone copy transcripts_ts gdrive:AETHER_TRANSCRIPTS/youtube_ts --include "*.jsonl" --transfers 32 || true

        '
  extrator:
    name: EXTRATOR (conteudo bruto -> pauta de producao)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.AETHER_PAT }}
    - name: deps
      run: pip install --quiet requests || true
    - name: corpus do Drive
      run: 'curl -s https://rclone.org/install.sh | sudo bash || true

        mkdir -p ~/.config/rclone transcripts

        echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf || true

        rclone copy gdrive:AETHER_TRANSCRIPTS/youtube transcripts --include "*.jsonl" --transfers 32 --fast-list || true'
    - name: escolher melhor IA gratis
      env:
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        GEMINI_PRO_MODEL: ${{ secrets.GEMINI_PRO_MODEL }}
      run: BEST=$(AI_ONCE=1 python ai_health.py 2>/dev/null | tail -1); [ -n "$BEST" ] && echo "AETHER_AI_ORDER=$BEST" >> $GITHUB_ENV || true
    - name: EXTRAI conhecimento bruto -> PAUTA
      env:
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        EXTRAI_MAXV: '1'
        EXTRAI_MAXCALLS: '60'
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        GEMINI_PRO_MODEL: ${{ secrets.GEMINI_PRO_MODEL }}
        EXTRAI_CANAIS: lucaslopesnutri
        EXTRAI_VIDEO: dwtFP3NaQP4
      run: 'python extrator.py || true

        git config user.email aether@local; git config user.name aether

        git add CONHECIMENTO_PRODUCAO.json PAUTA.json TOPICOS_POR_VIDEO.json 2>/dev/null || true

        git commit -q -m "pauta de producao (conteudo bruto)" || echo nada

        git pull --rebase -q origin main || git rebase --abort || true

        git push origin main && echo SALVO || echo FALHA'
